name: agent

on:
  pull_request_target:

permissions:
  contents: write
  id-token: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: owner/deploy-action@main
      - uses: actions/download-artifact@v4
      - run: |
          bash artifact/run.sh
          aws deploy push
